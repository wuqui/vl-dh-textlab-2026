<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TextLab Suchpipeline</title>
  <desc id="desc">Fünf Schritte der Suchpipeline: Query Builder, BCQL und Filter, Backend API, BlackLab Index, Module.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="138%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #071a44; font: 800 58px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #536577; font: 500 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { fill: #ffffff; stroke-width: 4; filter: url(#shadow); }
      .teal { stroke: #008c95; }
      .blue { stroke: #0059b8; }
      .orange { stroke: #ef7200; }
      .num { fill: #ffffff; font: 800 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #061a48; font: 800 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .sub { fill: #061a48; font: 500 21px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .arrow { fill: none; stroke: #061a48; stroke-width: 7; stroke-linecap: round; marker-end: url(#arrowHead); }
      .noteLine { stroke: #061a48; stroke-width: 3.2; }
      .note { fill: #061a48; font: 500 29px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#061a48"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="72" y="110">TextLab-Suchpipeline</text>
  <text class="subtitle" x="75" y="154">Von der UI-Auswahl zum interpretierbaren Trefferraum.</text>

  <g transform="translate(54 280)">
    <rect class="box teal" width="258" height="205" rx="6"/>
    <circle cx="129" cy="-3" r="30" fill="#008c95"/>
    <text class="num" x="129" y="-3">1</text>
    <text class="label" x="129" y="96">Query Builder</text>
    <text class="sub" x="129" y="139">UI-Auswahl</text>
  </g>
  <g transform="translate(360 280)">
    <rect class="box blue" width="258" height="205" rx="6"/>
    <circle cx="129" cy="-3" r="30" fill="#0059b8"/>
    <text class="num" x="129" y="-3">2</text>
    <text class="label" x="129" y="96">BCQL + Filter</text>
    <text class="sub" x="129" y="139">Suchmuster</text>
  </g>
  <g transform="translate(666 280)">
    <rect class="box orange" width="258" height="205" rx="6"/>
    <circle cx="129" cy="-3" r="30" fill="#ef7200"/>
    <text class="num" x="129" y="-3">3</text>
    <text class="label" x="129" y="96">Backend API</text>
    <text class="sub" x="129" y="139">validieren und ausführen</text>
  </g>
  <g transform="translate(972 280)">
    <rect class="box teal" width="258" height="205" rx="6"/>
    <circle cx="129" cy="-3" r="30" fill="#008c95"/>
    <text class="num" x="129" y="-3">4</text>
    <text class="label" x="129" y="96">BlackLab Index</text>
    <text class="sub" x="129" y="139">Trefferraum</text>
  </g>
  <g transform="translate(1278 280)">
    <rect class="box blue" width="258" height="205" rx="6"/>
    <circle cx="129" cy="-3" r="30" fill="#0059b8"/>
    <text class="num" x="129" y="-3">5</text>
    <text class="label" x="129" y="96">Module</text>
    <text class="sub" x="129" y="133">KWIC · Frequency</text>
    <text class="sub" x="129" y="163">Collocation</text>
  </g>

  <path class="arrow" d="M326 382H346"/>
  <path class="arrow" d="M632 382H652"/>
  <path class="arrow" d="M938 382H958"/>
  <path class="arrow" d="M1244 382H1264"/>
  <line class="noteLine" x1="115" y1="690" x2="1485" y2="690"/>
  <text class="note" x="800" y="765">Eine Query wird erst durch Belege und Parameter interpretierbar.</text>
</svg>
