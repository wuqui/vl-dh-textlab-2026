<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TextLab Analyse-Loop</title>
  <desc id="desc">Vier Schritte: Fragestellung, Korpus und Query, Modul und Parameter, Belege und Export; mit Rückbindung an Belege zur nächsten Frage.</desc>
  <defs>
    <filter id="softShadow" x="-12%" y="-18%" width="124%" height="142%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #ffffff; }
      .navy { fill: #061a48; }
      .muted { fill: #10224d; }
      .box { fill: #ffffff; stroke-width: 4; filter: url(#softShadow); }
      .teal { stroke: #008c95; }
      .blue { stroke: #0059b8; }
      .orange { stroke: #ef7200; }
      .step { fill: #ffffff; font: 800 42px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #061a48; font: 800 31px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .sub { fill: #061a48; font: 500 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .returnText { fill: #061a48; font: 800 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .note { fill: #061a48; font: 500 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .arrow { fill: none; stroke: #061a48; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .line { stroke: #061a48; stroke-width: 4; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#061a48"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <g transform="translate(34 245)">
    <rect class="box teal" x="0" y="0" width="338" height="228" rx="4"/>
    <circle cx="171" cy="-4" r="34" fill="#008c95"/>
    <text class="step" x="171" y="-4">1</text>
    <text class="label" x="169" y="112">Fragestellung</text>
    <text class="sub" x="169" y="162">Was soll sichtbar werden?</text>
  </g>

  <g transform="translate(430 245)">
    <rect class="box blue" x="0" y="0" width="338" height="228" rx="4"/>
    <circle cx="171" cy="-4" r="34" fill="#0059b8"/>
    <text class="step" x="171" y="-4">2</text>
    <text class="label" x="169" y="112">Korpus + Query</text>
    <text class="sub" x="169" y="162">Trefferraum definieren</text>
  </g>

  <g transform="translate(826 245)">
    <rect class="box orange" x="0" y="0" width="338" height="228" rx="4"/>
    <circle cx="171" cy="-4" r="34" fill="#ef7200"/>
    <text class="step" x="171" y="-4">3</text>
    <text class="label" x="169" y="112">Modul + Parameter</text>
    <text class="sub" x="169" y="162">zählen, gruppieren, modellieren</text>
  </g>

  <g transform="translate(1224 245)">
    <rect class="box teal" x="0" y="0" width="338" height="228" rx="4"/>
    <circle cx="171" cy="-4" r="34" fill="#008c95"/>
    <text class="step" x="171" y="-4">4</text>
    <text class="label" x="169" y="112">Belege + Export</text>
    <text class="sub" x="169" y="162">prüfen und dokumentieren</text>
  </g>

  <path class="arrow" marker-end="url(#arrowHead)" d="M386 359H417"/>
  <path class="arrow" marker-end="url(#arrowHead)" d="M782 359H813"/>
  <path class="arrow" marker-end="url(#arrowHead)" d="M1178 359H1211"/>

  <path class="arrow" marker-end="url(#arrowHead)" d="M1400 490 V560 C1400 640 1290 640 1205 640 H260 C174 640 150 600 150 560 V500"/>
  <text class="returnText" x="800" y="603">Rückbindung an Belege erzeugt die nächste Frage</text>

  <line class="line" x1="50" y1="764" x2="1550" y2="764"/>
  <text class="note" x="800" y="835">Counts, Cluster oder Labels werden erst durch KWIC-Belege interpretierbar.</text>
</svg>
